# Slowest tests signal (weekly / manual). Not a benchmark harness — see plan T4 DEFER for strict perf SLOs.
name: perf-durations

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 3"

jobs:
  pytest-durations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install + report slowest tests
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"
          python -m pytest tests/ -q --tb=line --durations=25
