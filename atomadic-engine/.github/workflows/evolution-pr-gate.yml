# Runtime gate for evolution PRs: full pytest + CLI smoke (ass-ade / python -m).
name: evolution-pr-gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  evolution-gate:
    if: startsWith(github.head_ref, 'auto-evolve/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install editable (dev)
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: CLI smoke (runtime)
        run: |
          set -euo pipefail
          ass-ade --help >/dev/null
          ass-ade doctor --no-remote
          python -m ass_ade --help >/dev/null

      - name: Full pytest suite
        run: python -m pytest tests/ -q --tb=line
