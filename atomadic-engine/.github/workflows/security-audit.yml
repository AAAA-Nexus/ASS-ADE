# Scheduled supply-chain scan (MAP=TERRAIN: extend GitHub, no parallel secret stores).
name: security-audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project (dev extras) + pip-audit
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"
          python -m pip install "pip-audit>=2.7,<3"
      - name: Audit installed environment
        run: pip-audit --desc on
