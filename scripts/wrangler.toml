# Wrangler config for hello.atomadic.tech standalone Worker
# Deploy with: wrangler deploy  (or `atomadic hello deploy`)

name = "hello-atomadic"
main = "hello_worker.js"
compatibility_date = "2024-11-01"

[vars]
ATOMADIC_INFERENCE_URL = "https://atomadic.tech/v1"

# Bind your secret in the dashboard or via:
#   wrangler secret put ATOMADIC_INFERENCE_KEY
