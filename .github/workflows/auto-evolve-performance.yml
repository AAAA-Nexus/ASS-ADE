name: Auto-Evolution — Performance
on:
  schedule:
    - cron: '*/12 * * * *'
  workflow_dispatch: {}

# Personality: aggressive/optimizing — target complexity, long functions, nested logic.
# Applies top 3 performance-focused changes per cycle without hesitation.

jobs:
  evolve-performance:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ASS-ADE
        run: pip install -e ".[dev]"

      # Phase 0 — Bootstrap recon
      - name: Phase 0 — Bootstrap recon
        run: ass-ade recon . --json > recon_before.json 2>&1 || true

      # Phase 1 — Assessment scan (full)
      - name: Phase 1 — Assessment scan
        run: ass-ade enhance . --json > enhance_scan_raw.json 2>&1 || true

      # Phase 2 — Context filter: performance track (aggressive/optimizing)
      - name: Phase 2 — Context filter (performance track)
        run: |
          python3 -c "
          import json
          try:
              d = json.load(open('enhance_scan_raw.json'))
              performance_types = {
                  'long_function', 'complex_function', 'nested_loop', 'performance',
                  'inefficient_loop', 'redundant_computation', 'unnecessary_copy',
                  'missing_cache', 'n_plus_one', 'quadratic_complexity',
                  'deep_nesting', 'large_class',
              }
              opps = d.get('opportunities', [])
              perf_opps = [o for o in opps if any(t in o.get('type','').lower() for t in performance_types)]
              if not perf_opps:
                  # aggressive fallback: target longest/most complex regardless of label
                  perf_opps = opps[:3]
              d['opportunities'] = perf_opps
              d['total_found'] = len(perf_opps)
              json.dump(d, open('enhance_scan.json','w'), indent=2)
              print(f'Performance targets: {len(perf_opps)} of {len(opps)} total')
          except Exception as e:
              json.dump({'opportunities':[], 'total_found':0, 'error':str(e)}, open('enhance_scan.json','w'))
          " 2>&1 || true

          CYCLE_NUM=$(python3 -c "
          try:
              lines = open('EVOLUTION_LOG.md').readlines()
              nums = [int(l.split('#')[-1].split(' ')[0])
                      for l in lines if l.strip().startswith('## Evolution #')]
              print(max(nums) + 1 if nums else 1)
          except:
              print(1)
          " 2>&1 || echo "1")
          echo "CYCLE_NUM=$CYCLE_NUM" >> $GITHUB_ENV

          TOTAL_FOUND=$(python3 -c "
          import json
          try:
              d = json.load(open('enhance_scan.json'))
              print(d.get('total_found', 0))
          except:
              print(0)
          " 2>&1 || echo "0")
          echo "TOTAL_FOUND=$TOTAL_FOUND" >> $GITHUB_ENV

      - name: Create evolution branch
        run: |
          BRANCH="auto-evolve/performance-$(date +%Y%m%d-%H%M)"
          git checkout -b $BRANCH
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      # Phase 3 — Synthesis: aggressive top-3 performance optimization
      - name: Phase 3 — Synthesis (aggressive performance optimize)
        run: |
          COUNT=$(python3 -c "
          import json
          d = json.load(open('enhance_scan.json'))
          print(d.get('total_found', 0))
          " 2>&1 || echo "0")
          if [ "$COUNT" -gt 0 ]; then
            echo "Applying top 3 performance optimizations (aggressive mode)"
            ass-ade enhance . --apply 1,2,3 2>&1 || true
          else
            echo "No performance targets — skipping"
            exit 0
          fi

      # Phase 4 — Audit recon
      - name: Phase 4 — Audit recon
        run: ass-ade recon . --json > recon_after.json 2>&1 || true

      # Phase 5 — Autopoiesis validate (measure complexity delta)
      - name: Phase 5 — Autopoiesis validate
        run: |
          COMPLEXITY_DELTA=$(python3 -c "
          import json
          try:
              before = json.load(open('recon_before.json'))
              after  = json.load(open('recon_after.json'))
              # lower complexity is better — negative delta = improvement
              b = before.get('avg_complexity', before.get('total_py_files', 0))
              a = after.get('avg_complexity', after.get('total_py_files', 0))
              print(round(a - b, 2))
          except:
              print(0)
          " 2>&1 || echo "0")
          echo "COMPLEXITY_DELTA=$COMPLEXITY_DELTA" >> $GITHUB_ENV

          ENHANCEMENT=$(python3 -c "
          import json
          try:
              d = json.load(open('enhance_scan.json'))
              opps = d.get('opportunities', [])
              if opps:
                  o = opps[0]
                  print(f\"{o.get('type','unknown')} in {o.get('file','?')}\")
              else:
                  print('no performance targets found')
          except Exception as e:
              print(f'scan error: {e}')
          " 2>&1 || echo "unknown")
          echo "ENHANCEMENT=$ENHANCEMENT" >> $GITHUB_ENV

      - name: Bump patch version
        run: |
          CURRENT=$(python3 -c "
          import re
          content = open('pyproject.toml').read()
          m = re.search(r'version = \"([\d.]+)\"', content)
          print(m.group(1) if m else '0.2.0')
          ")
          NEW=$(python3 -c "
          parts = '$CURRENT'.split('.')
          parts[-1] = str(int(parts[-1]) + 1)
          print('.'.join(parts))
          ")
          sed -i "s/version = \"$CURRENT\"/version = \"$NEW\"/" pyproject.toml
          sed -i "s/__version__ = \"$CURRENT\"/__version__ = \"$NEW\"/" __init__.py 2>/dev/null || true
          echo "NEW_VERSION=$NEW" >> $GITHUB_ENV

      - name: Append to EVOLUTION_LOG.md
        run: |
          FILES_CHANGED=$(git diff --name-only \
            | grep -vE '^(enhance_scan.*\.json|EVOLUTION_LOG\.md|pyproject\.toml|__init__\.py)$' \
            | wc -l | tr -d ' ')
          cat >> EVOLUTION_LOG.md << EOF

## Evolution #${{ env.CYCLE_NUM }} [PERFORMANCE] — $(date -u '+%Y-%m-%d %H:%M UTC')
**Enhancement:** ${{ env.ENHANCEMENT }}
**Lane:** performance — long functions, complexity reduction, loop optimization
**Personality:** aggressive/optimizing (top 3 per cycle, no hesitation)
**Complexity delta:** ${{ env.COMPLEXITY_DELTA }}
**Files changed:** ${FILES_CHANGED}
**Version:** ${{ env.NEW_VERSION }}
EOF

      - name: Commit and push branch
        run: |
          git config user.name "ASS-ADE Auto-Evolve"
          git config user.email "evolve@atomadic.tech"
          git add -A
          PY_CHANGES=$(git diff --cached --name-only \
            | grep -vE '^(enhance_scan.*\.json)$' \
            | wc -l | tr -d ' ')
          if [ "$PY_CHANGES" -eq 0 ]; then
            echo "No performance changes — skipping"
            exit 0
          fi
          git commit -m "evolution/performance: ${{ env.ENHANCEMENT }} (v${{ env.NEW_VERSION }})"
          git push origin ${{ env.BRANCH }}

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SCAN_SUMMARY=$(cat enhance_scan.json 2>/dev/null | python3 -c "
          import json, sys
          try:
              d = json.load(sys.stdin)
              opps = d.get('opportunities', [])
              lines = [f'- \`{o[\"type\"]}\` in \`{o[\"file\"]}\`' for o in opps[:10]]
              print('\n'.join(lines))
          except:
              print('scan unavailable')
          " 2>&1 || echo "scan unavailable")

          RECON_BEFORE=$(cat recon_before.json 2>/dev/null | python3 -c "
          import json, sys
          try:
              d = json.load(sys.stdin)
              print(f'{d[\"total_py_files\"]} py files, {d[\"manifest_components\"]} components')
          except:
              print('unavailable')
          " 2>&1 || echo "unavailable")

          RECON_AFTER=$(cat recon_after.json 2>/dev/null | python3 -c "
          import json, sys
          try:
              d = json.load(sys.stdin)
              print(f'{d[\"total_py_files\"]} py files, {d[\"manifest_components\"]} components')
          except:
              print('unavailable')
          " 2>&1 || echo "unavailable")

          gh pr create \
            --title "[PERFORMANCE] evolution: ${{ env.ENHANCEMENT }} (v${{ env.NEW_VERSION }})" \
            --body "$(cat <<PRBODY
## Performance Evolution Cycle #${{ env.CYCLE_NUM }} — $(date -u '+%Y-%m-%d %H:%M UTC')

**Version:** → v${{ env.NEW_VERSION }}
**Lane:** PERFORMANCE — long functions, complexity reduction, loop optimization
**Personality:** aggressive/optimizing — top 3 per cycle, no hesitation
**Complexity delta:** ${{ env.COMPLEXITY_DELTA }}

## Performance targets
${SCAN_SUMMARY}

## Before / After
- Before: ${RECON_BEFORE}
- After: ${RECON_AFTER}

> Part of the ASS-ADE five-lane evolution system (general / security / quality / features / performance).
PRBODY
          )" \
            --base main \
            --head ${{ env.BRANCH }} || true
