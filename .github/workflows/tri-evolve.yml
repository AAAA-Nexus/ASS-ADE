# Tri-Evolution workflow — three concurrent lanes, each evolving ASS-ADE independently.
#
# CONSERVATIVE (every 6h)  — safest fix, highest-severity finding, must be green.
# EXPLORATORY  (every 12h) — random finding, novel approach via forge.
# ADVERSARIAL  (daily)     — stress-test worst area, break then fix.
#
# TRIUMPH: when all three lanes agree on the same fix independently, auto-merge.

name: tri-evolve

on:
  schedule:
    - cron: "0 */6 * * *"       # conservative (every 6h)
    - cron: "0 */12 * * *"      # exploratory (every 12h)
    - cron: "0 2 * * *"         # adversarial daily at 02:00 UTC
  workflow_dispatch:
    inputs:
      lane:
        description: "Lane to run (conservative | exploratory | adversarial | all)"
        required: false
        default: "all"

env:
  PYTHON_VERSION: "3.12"

# ─── Shared helpers ──────────────────────────────────────────────────────────
# Each job: pull lane branch → run analysis → apply fix → test → open PR if green.
# PR dedup: check for existing open PRs from the lane before creating a new one.

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # CONSERVATIVE — every 6 hours, highest-severity finding, safest fix
  # ═══════════════════════════════════════════════════════════════════════════
  conservative:
    name: "Evolve / Conservative"
    if: >-
      (github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.lane == 'conservative' || github.event.inputs.lane == 'all' || github.event.inputs.lane == '')) ||
      github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      EVOLUTION_LANE: conservative
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ASS_ADE_PROVIDER: anthropic
      ASS_ADE_MODEL: claude-haiku-4-5-20251001

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up lane branch
        run: |
          git config user.email "tri-evolve[bot]@atomadic.ai"
          git config user.name "tri-evolve[bot]"
          git fetch origin evolve/conservative 2>/dev/null \
            && git checkout evolve/conservative \
            || git checkout -b evolve/conservative

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install
        run: pip install -e ".[dev]" --quiet

      - name: Merge latest main
        run: |
          git config user.email "tri-evolve[bot]@atomadic.ai"
          git config user.name "tri-evolve[bot]"
          git fetch origin main
          git merge origin/main --no-edit || true

      - name: Check for existing open PR
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh pr list --repo ${{ github.repository }} \
            --head evolve/conservative --state open --json number --jq length)
          echo "open_prs=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Run conservative evolution
        if: steps.check_pr.outputs.open_prs == '0'
        id: evolve
        run: |
          set -euo pipefail
          echo "lane=conservative" >> "$GITHUB_OUTPUT"

          # Find highest-severity finding
          ass-ade doctor --json 2>/dev/null | python -c "
          import json, sys
          try:
              data = json.load(sys.stdin)
              findings = data.get('findings', [])
              if findings:
                  # Sort by severity: error > warning > info
                  order = {'error': 0, 'warning': 1, 'info': 2}
                  top = sorted(findings, key=lambda f: order.get(f.get('level','info'), 99))[0]
                  print(top.get('area', 'general'))
              else:
                  print('general')
          except Exception:
              print('general')
          " > /tmp/target_area.txt || echo "general" > /tmp/target_area.txt

          TARGET=$(cat /tmp/target_area.txt)
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "[conservative] Targeting area: $TARGET"

          # Run enhance with local-only (no forge calls)
          ass-ade enhance --local-only --area "$TARGET" \
            --output /tmp/conservative_patch.json 2>/dev/null || true

          # Apply patch if produced
          if [ -f /tmp/conservative_patch.json ]; then
            ass-ade patch apply /tmp/conservative_patch.json 2>/dev/null || true
          fi

      - name: Run tests
        if: steps.check_pr.outputs.open_prs == '0' && steps.evolve.conclusion == 'success'
        id: tests
        run: |
          python -m pytest tests/ -x --tb=short -q 2>&1 | tail -5
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Bump patch version + commit
        if: steps.check_pr.outputs.open_prs == '0' && steps.tests.conclusion == 'success'
        run: |
          git config user.email "tri-evolve[bot]@atomadic.ai"
          git config user.name "tri-evolve[bot]"

          # Bump patch version in pyproject.toml
          python -c "
          import re; f=open('pyproject.toml'); t=f.read(); f.close()
          def bump(m):
              a,b,c = m.group(1).split('.')
              return f'version = \"{a}.{b}.{int(c)+1}\"'
          t=re.sub(r'version = \"(\d+\.\d+\.\d+)\"', bump, t, count=1)
          open('pyproject.toml','w').write(t)
          "

          git add -A
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "evolve(conservative): $(cat /tmp/target_area.txt) — safest fix [lane:conservative]"
          git push origin evolve/conservative

      - name: Open PR to main
        if: steps.check_pr.outputs.open_prs == '0' && steps.tests.conclusion == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '## Conservative Evolution Lane\n\n**Target area:** %s\n**Strategy:** Highest-severity finding, safest fix, local-only\n**Tests:** All green\n**Lane:** conservative\n\n> Auto-generated by tri-evolve / conservative lane.\n' \
            "$(cat /tmp/target_area.txt)" > /tmp/pr_body.md
          gh pr create \
            --repo ${{ github.repository }} \
            --head evolve/conservative \
            --base main \
            --title "evolve(conservative): $(cat /tmp/target_area.txt) fix" \
            --body-file /tmp/pr_body.md

  # ═══════════════════════════════════════════════════════════════════════════
  # EXPLORATORY — every 12 hours, random finding, novel forge approach
  # ═══════════════════════════════════════════════════════════════════════════
  exploratory:
    name: "Evolve / Exploratory"
    if: >-
      (github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.lane == 'exploratory' || github.event.inputs.lane == 'all' || github.event.inputs.lane == '')) ||
      github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      EVOLUTION_LANE: exploratory
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ASS_ADE_PROVIDER: anthropic
      ASS_ADE_MODEL: claude-sonnet-4-6

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up lane branch
        run: |
          git config user.email "tri-evolve[bot]@atomadic.ai"
          git config user.name "tri-evolve[bot]"
          git fetch origin evolve/exploratory 2>/dev/null \
            && git checkout evolve/exploratory \
            || git checkout -b evolve/exploratory

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install
        run: pip install -e ".[dev]" --quiet

      - name: Merge latest main
        run: |
          git config user.email "tri-evolve[bot]@atomadic.ai"
          git config user.name "tri-evolve[bot]"
          git fetch origin main
          git merge origin/main --no-edit || true

      - name: Check for existing open PR
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh pr list --repo ${{ github.repository }} \
            --head evolve/exploratory --state open --json number --jq length)
          echo "open_prs=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Run exploratory evolution
        if: steps.check_pr.outputs.open_prs == '0'
        id: evolve
        run: |
          set -euo pipefail

          # Pick a RANDOM finding area
          ass-ade doctor --json 2>/dev/null | python -c "
          import json, sys, random
          try:
              data = json.load(sys.stdin)
              findings = data.get('findings', [])
              if findings:
                  pick = random.choice(findings)
                  print(pick.get('area', 'general'))
              else:
                  areas = ['engine', 'protocol', 'agent', 'tools', 'mcp']
                  print(random.choice(areas))
          except Exception:
              import random
              print(random.choice(['engine','protocol','agent','tools']))
          " > /tmp/target_area.txt || echo "engine" > /tmp/target_area.txt

          TARGET=$(cat /tmp/target_area.txt)
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "[exploratory] Random target: $TARGET"

          # Run enhance with forge (experimental approaches allowed)
          ass-ade enhance --area "$TARGET" --strategy novel \
            --output /tmp/exploratory_patch.json 2>/dev/null || true

          if [ -f /tmp/exploratory_patch.json ]; then
            ass-ade patch apply /tmp/exploratory_patch.json 2>/dev/null || true
          fi

      - name: Run tests
        if: steps.check_pr.outputs.open_prs == '0' && steps.evolve.conclusion == 'success'
        id: tests
        run: python -m pytest tests/ -x --tb=short -q 2>&1 | tail -5

      - name: Bump patch version + commit
        if: steps.check_pr.outputs.open_prs == '0' && steps.tests.conclusion == 'success'
        run: |
          git config user.email "tri-evolve[bot]@atomadic.ai"
          git config user.name "tri-evolve[bot]"
          python -c "
          import re; f=open('pyproject.toml'); t=f.read(); f.close()
          def bump(m):
              a,b,c = m.group(1).split('.')
              return f'version = \"{a}.{b}.{int(c)+1}\"'
          t=re.sub(r'version = \"(\d+\.\d+\.\d+)\"', bump, t, count=1)
          open('pyproject.toml','w').write(t)
          "
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "evolve(exploratory): $(cat /tmp/target_area.txt) — novel approach [lane:exploratory]"
          git push origin evolve/exploratory

      - name: Open PR to main
        if: steps.check_pr.outputs.open_prs == '0' && steps.tests.conclusion == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '## Exploratory Evolution Lane\n\n**Target area:** %s\n**Strategy:** Random finding, novel approach (forge-assisted)\n**Tests:** All green\n**Lane:** exploratory\n\n> Auto-generated by tri-evolve / exploratory lane. More experimental than conservative.\n' \
            "$(cat /tmp/target_area.txt)" > /tmp/pr_body.md
          gh pr create \
            --repo ${{ github.repository }} \
            --head evolve/exploratory \
            --base main \
            --title "evolve(exploratory): $(cat /tmp/target_area.txt) — novel approach" \
            --body-file /tmp/pr_body.md

  # ═══════════════════════════════════════════════════════════════════════════
  # ADVERSARIAL — daily, stress-test worst area, break then fix
  # ═══════════════════════════════════════════════════════════════════════════
  adversarial:
    name: "Evolve / Adversarial"
    if: >-
      (github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.lane == 'adversarial' || github.event.inputs.lane == 'all' || github.event.inputs.lane == '')) ||
      (github.event_name == 'schedule' && startsWith(github.event.schedule, '0 2'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      EVOLUTION_LANE: adversarial
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ASS_ADE_PROVIDER: anthropic
      ASS_ADE_MODEL: claude-sonnet-4-6

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up lane branch
        run: |
          git config user.email "tri-evolve[bot]@atomadic.ai"
          git config user.name "tri-evolve[bot]"
          git fetch origin evolve/adversarial 2>/dev/null \
            && git checkout evolve/adversarial \
            || git checkout -b evolve/adversarial

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install
        run: pip install -e ".[dev]" --quiet

      - name: Merge latest main
        run: |
          git config user.email "tri-evolve[bot]@atomadic.ai"
          git config user.name "tri-evolve[bot]"
          git fetch origin main
          git merge origin/main --no-edit || true

      - name: Check for existing open PR
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh pr list --repo ${{ github.repository }} \
            --head evolve/adversarial --state open --json number --jq length)
          echo "open_prs=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Eco-scan — find worst-scoring area
        if: steps.check_pr.outputs.open_prs == '0'
        id: scan
        run: |
          ass-ade eco-scan --json 2>/dev/null | python -c "
          import json, sys
          try:
              data = json.load(sys.stdin)
              areas = data.get('areas', [])
              if areas:
                  worst = min(areas, key=lambda a: a.get('score', 100))
                  print(worst.get('name', 'engine'))
              else:
                  print('engine')
          except Exception:
              print('engine')
          " > /tmp/worst_area.txt || echo "engine" > /tmp/worst_area.txt

          WORST=$(cat /tmp/worst_area.txt)
          echo "worst=$WORST" >> "$GITHUB_OUTPUT"
          echo "[adversarial] Worst area: $WORST"

      - name: Stress test — deliberately probe the worst area
        if: steps.check_pr.outputs.open_prs == '0'
        id: stress
        run: |
          WORST=$(cat /tmp/worst_area.txt)
          echo "[adversarial] Stress-testing: $WORST"

          # Run tests for just the worst area to see what breaks
          python -m pytest tests/ -k "$WORST" --tb=short -q 2>/tmp/stress_results.txt || true

          # Run full suite to capture baseline failures
          python -m pytest tests/ --tb=line -q 2>/tmp/full_baseline.txt || true

          echo "stress_done=true" >> "$GITHUB_OUTPUT"

      - name: Apply adversarial fix
        if: steps.check_pr.outputs.open_prs == '0' && steps.stress.outputs.stress_done == 'true'
        id: fix
        run: |
          WORST=$(cat /tmp/worst_area.txt)

          # Ask the engine to fix whatever the stress test exposed
          ass-ade enhance --area "$WORST" --strategy adversarial \
            --context-file /tmp/stress_results.txt \
            --output /tmp/adversarial_patch.json 2>/dev/null || true

          if [ -f /tmp/adversarial_patch.json ]; then
            ass-ade patch apply /tmp/adversarial_patch.json 2>/dev/null || true
          fi

      - name: Verify fix — full test suite must be green
        if: steps.check_pr.outputs.open_prs == '0' && steps.fix.conclusion == 'success'
        id: verify
        run: python -m pytest tests/ -x --tb=short -q 2>&1 | tail -5

      - name: Bump patch version + commit
        if: steps.check_pr.outputs.open_prs == '0' && steps.verify.conclusion == 'success'
        run: |
          git config user.email "tri-evolve[bot]@atomadic.ai"
          git config user.name "tri-evolve[bot]"
          python -c "
          import re; f=open('pyproject.toml'); t=f.read(); f.close()
          def bump(m):
              a,b,c = m.group(1).split('.')
              return f'version = \"{a}.{b}.{int(c)+1}\"'
          t=re.sub(r'version = \"(\d+\.\d+\.\d+)\"', bump, t, count=1)
          open('pyproject.toml','w').write(t)
          "
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "evolve(adversarial): $(cat /tmp/worst_area.txt) — stress-hardened [lane:adversarial]"
          git push origin evolve/adversarial

      - name: Open PR to main
        if: steps.check_pr.outputs.open_prs == '0' && steps.verify.conclusion == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '## Adversarial Evolution Lane\n\n**Worst area:** %s\n**Strategy:** eco-scan -> stress test -> break -> fix -> verify\n**Tests:** All green post-fix\n**Lane:** adversarial\n\n> Auto-generated by tri-evolve / adversarial lane. Hardened under deliberate stress.\n' \
            "$(cat /tmp/worst_area.txt)" > /tmp/pr_body.md
          gh pr create \
            --repo ${{ github.repository }} \
            --head evolve/adversarial \
            --base main \
            --title "evolve(adversarial): $(cat /tmp/worst_area.txt) — stress-hardened" \
            --body-file /tmp/pr_body.md

  # ═══════════════════════════════════════════════════════════════════════════
  # TRIUMPH — all three lanes agree on the same fix: auto-merge
  # ═══════════════════════════════════════════════════════════════════════════
  triumph:
    name: "Triumph Check — Auto-merge if all lanes agree"
    needs: [conservative, exploratory, adversarial]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for tri-lane consensus
        run: |
          # Collect open PRs from all three lanes
          C_PR=$(gh pr list --repo ${{ github.repository }} \
            --head evolve/conservative --state open --json title --jq '.[0].title // ""')
          E_PR=$(gh pr list --repo ${{ github.repository }} \
            --head evolve/exploratory  --state open --json title --jq '.[0].title // ""')
          A_PR=$(gh pr list --repo ${{ github.repository }} \
            --head evolve/adversarial  --state open --json title --jq '.[0].title // ""')

          echo "[triumph] Conservative: $C_PR"
          echo "[triumph] Exploratory:  $E_PR"
          echo "[triumph] Adversarial:  $A_PR"

          # Extract area from title (everything after "evolve(lane): " and before " —")
          C_AREA=$(echo "$C_PR" | sed 's/evolve([^)]*): //' | sed 's/ .*//')
          E_AREA=$(echo "$E_PR" | sed 's/evolve([^)]*): //' | sed 's/ .*//')
          A_AREA=$(echo "$A_PR" | sed 's/evolve([^)]*): //' | sed 's/ .*//')

          if [ -n "$C_AREA" ] && [ "$C_AREA" = "$E_AREA" ] && [ "$E_AREA" = "$A_AREA" ]; then
            echo "TRIUMPH: All three lanes targeting '$C_AREA' — auto-merging conservative PR"

            # Auto-merge the conservative PR (safest, already green)
            gh pr merge --repo ${{ github.repository }} \
              --head evolve/conservative \
              --squash \
              --subject "TRIUMPH: $C_AREA — tri-lane consensus auto-merge" \
              --body "All three evolution lanes (conservative, exploratory, adversarial) independently agreed on this fix. Auto-merged without review. This is a TRIUMPH event."

            # Close the other two (main now has the fix)
            gh pr close --repo ${{ github.repository }} \
              --head evolve/exploratory --comment "TRIUMPH: conservative lane merged. This lane's fix was independently validated." || true
            gh pr close --repo ${{ github.repository }} \
              --head evolve/adversarial --comment "TRIUMPH: conservative lane merged. This lane's fix was independently validated." || true
          else
            echo "No tri-lane consensus yet — lanes diverge (normal). Standing by."
          fi
