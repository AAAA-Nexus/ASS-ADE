name: Auto-Evolution Cycle
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ASS-ADE
        run: pip install -e ".[dev]"

      - name: Phase 0 - Bootstrap recon
        run: ass-ade recon . --json > recon_before.json 2>&1 || true

      - name: Phase 1 - Assessment scan
        run: ass-ade enhance . --json > enhance_scan.json 2>&1 || true

      - name: Phase 2 - Context (cycle level)
        run: |
          CYCLE_NUM=$(python3 -c "
          try:
              lines = open('EVOLUTION_LOG.md').readlines()
              nums = [int(l.split('#')[-1].split(' ')[0])
                      for l in lines if l.strip().startswith('## Evolution #')]
              print(max(nums) + 1 if nums else 1)
          except:
              print(1)
          " 2>&1 || echo "1")
          echo "CYCLE_NUM=$CYCLE_NUM" >> $GITHUB_ENV

          LEVEL=$(python3 -c "
          n = int('$CYCLE_NUM')
          if n <= 50:    print(1)
          elif n <= 200: print(2)
          elif n <= 500: print(3)
          else:          print(4)
          " 2>&1 || echo "1")
          echo "EVOLUTION_LEVEL=$LEVEL" >> $GITHUB_ENV

          TOTAL_FOUND=$(python3 -c "
          import json
          try:
              d = json.load(open('enhance_scan.json'))
              print(d.get('total_found', 0))
          except:
              print(0)
          " 2>&1 || echo "0")
          echo "TOTAL_FOUND=$TOTAL_FOUND" >> $GITHUB_ENV

          BRANCH_AREA="general"
          if [ "$LEVEL" = "4" ]; then
            BRANCH_AREA=$(python3 -c "
          import json
          from collections import Counter
          try:
              d = json.load(open('enhance_scan.json'))
              opps = d.get('opportunities', [])
              cosmetic = {'missing_module_docstring','missing_function_docstring','unused_import','dead_code'}
              total = len(opps)
              cosmetic_count = sum(1 for o in opps if o.get('type','') in cosmetic)
              if total > 0 and cosmetic_count / total > 0.7:
                  files = [o.get('file','unknown').split('/')[0] for o in opps[:10]]
                  area = Counter(files).most_common(1)[0][0] if files else 'core'
                  print(area.replace('/','-').replace('.',''))
              else:
                  print('general')
          except:
              print('general')
          " 2>&1 || echo "general")
          fi
          echo "BRANCH_AREA=$BRANCH_AREA" >> $GITHUB_ENV
          echo "Cycle $CYCLE_NUM level $LEVEL area $BRANCH_AREA"

      - name: Create evolution branch
        run: |
          if [ "${{ env.EVOLUTION_LEVEL }}" = "4" ] && [ "${{ env.BRANCH_AREA }}" != "general" ]; then
            BRANCH="auto-evolve/deep-${{ env.BRANCH_AREA }}-$(date +%Y%m%d-%H%M)"
          else
            BRANCH="auto-evolve/$(date +%Y%m%d-%H%M)"
          fi
          git checkout -b $BRANCH
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Phase 3 - Synthesis (level-aware apply)
        run: |
          LEVEL="${{ env.EVOLUTION_LEVEL }}"
          if [ "$LEVEL" = "1" ]; then
            echo "Level 1: single enhancement"
            ass-ade enhance . --apply 1 2>&1 || true
          elif [ "$LEVEL" = "2" ]; then
            echo "Level 2: multi-apply top 3"
            ass-ade enhance . --apply 1,2,3 2>&1 || true
          elif [ "$LEVEL" = "3" ]; then
            echo "Level 3: blueprint-design + apply"
            IMPROVEMENT=$(python3 -c "
          import json
          try:
              d = json.load(open('enhance_scan.json'))
              opps = d.get('opportunities', [])
              types = list(dict.fromkeys(o.get('type','') for o in opps[:5]))
              print('improve: ' + ', '.join(types[:3]))
          except:
              print('improve code quality and structure')
          " 2>&1 || echo "improve code quality and structure")
            ass-ade design "$IMPROVEMENT" 2>&1 || true
            ass-ade enhance . --apply 1,2,3 2>&1 || true
          else
            echo "Level 4: deep-area apply top 5"
            ass-ade enhance . --apply 1,2,3,4,5 2>&1 || true
          fi

      - name: Phase 4 - Audit recon
        run: ass-ade recon . --json > recon_after.json 2>&1 || true

      - name: Phase 5 - Autopoiesis validate
        run: |
          IMPROVEMENT_DELTA=$(python3 -c "
          import json
          try:
              before = json.load(open('recon_before.json'))
              after  = json.load(open('recon_after.json'))
              b_files = before.get('total_py_files', 0)
              a_files = after.get('total_py_files', 0)
              b_comp  = before.get('manifest_components', 0)
              a_comp  = after.get('manifest_components', 0)
              print((a_files - b_files) + (a_comp - b_comp))
          except:
              print(0)
          " 2>&1 || echo "0")
          echo "IMPROVEMENT_DELTA=$IMPROVEMENT_DELTA" >> $GITHUB_ENV

          ENHANCEMENT=$(python3 -c "
          import json
          try:
              d = json.load(open('enhance_scan.json'))
              opps = d.get('opportunities', [])
              if opps:
                  o = opps[0]
                  print(f\"{o.get('type','unknown')} in {o.get('file','?')}\")
              else:
                  print('no opportunities found')
          except Exception as e:
              print(f'scan error: {e}')
          " 2>&1 || echo "unknown enhancement")
          echo "ENHANCEMENT=$ENHANCEMENT" >> $GITHUB_ENV

      - name: Bump patch version
        run: |
          CURRENT=$(python3 -c "
          import re
          content = open('pyproject.toml').read()
          m = re.search(r'version = \"([\d.]+)\"', content)
          print(m.group(1) if m else '0.2.0')
          ")
          NEW=$(python3 -c "
          parts = '$CURRENT'.split('.')
          parts[-1] = str(int(parts[-1]) + 1)
          print('.'.join(parts))
          ")
          sed -i "s/version = \"$CURRENT\"/version = \"$NEW\"/" pyproject.toml
          sed -i "s/__version__ = \"$CURRENT\"/__version__ = \"$NEW\"/" __init__.py 2>/dev/null || true
          echo "NEW_VERSION=$NEW" >> $GITHUB_ENV
          echo "Bumped $CURRENT -> $NEW"

      - name: Append to EVOLUTION_LOG.md
        run: |
          FILES_CHANGED=$(git diff --name-only \
            | grep -vE '^(enhance_scan\.json|recon_before\.json|recon_after\.json|EVOLUTION_LOG\.md|pyproject\.toml|__init__\.py)$' \
            | wc -l | tr -d ' ')

          LEVEL_LABEL=$(python3 -c "
          labels = {'1': 'L1-single', '2': 'L2-multi', '3': 'L3-blueprint', '4': 'L4-deep'}
          print(labels.get('${{ env.EVOLUTION_LEVEL }}', 'L?'))
          " 2>&1 || echo "L?")

          cat >> EVOLUTION_LOG.md << EOF

          ## Evolution #${{ env.CYCLE_NUM }} -- $(date -u '+%Y-%m-%d %H:%M UTC')
          **Level:** ${{ env.EVOLUTION_LEVEL }} (${LEVEL_LABEL})
          **Enhancement:** ${{ env.ENHANCEMENT }}
          **Triggered by:** Auto-scan (${{ env.TOTAL_FOUND }} opportunities found)
          **Delta:** ${{ env.IMPROVEMENT_DELTA }}
          **Files changed:** ${FILES_CHANGED}
          **Version:** ${{ env.NEW_VERSION }}
          EOF

      - name: Commit and push branch
        run: |
          git config user.name "ASS-ADE Auto-Evolve"
          git config user.email "evolve@atomadic.tech"
          git add -A
          PY_CHANGES=$(git diff --cached --name-only \
            | grep -vE '^(enhance_scan\.json|recon_before\.json|recon_after\.json)$' \
            | wc -l | tr -d ' ')
          if [ "$PY_CHANGES" -eq 0 ]; then
            echo "No meaningful source changes -- skipping commit and PR"
            exit 0
          fi
          git commit -m "evolution(L${{ env.EVOLUTION_LEVEL }}): ${{ env.ENHANCEMENT }} (v${{ env.NEW_VERSION }})"
          git push origin ${{ env.BRANCH }}

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SCAN_SUMMARY=$(cat enhance_scan.json 2>/dev/null | python3 -c "
          import json, sys
          try:
              d = json.load(sys.stdin)
              opps = d.get('opportunities', [])
              lines = [f'- {o[\"type\"]} in \`{o[\"file\"]}\`' for o in opps[:10]]
              print('\n'.join(lines))
          except:
              print('scan unavailable')
          " 2>&1 || echo "scan unavailable")

          RECON_BEFORE=$(cat recon_before.json 2>/dev/null | python3 -c "
          import json, sys
          try:
              d = json.load(sys.stdin)
              print(f'{d[\"total_py_files\"]} py files, {d[\"manifest_components\"]} components')
          except:
              print('unavailable')
          " 2>&1 || echo "unavailable")

          RECON_AFTER=$(cat recon_after.json 2>/dev/null | python3 -c "
          import json, sys
          try:
              d = json.load(sys.stdin)
              print(f'{d[\"total_py_files\"]} py files, {d[\"manifest_components\"]} components')
          except:
              print('unavailable')
          " 2>&1 || echo "unavailable")

          LEVEL_DESC=$(python3 -c "
          descs = {'1': 'single enhancement', '2': 'multi-apply top 3', '3': 'blueprint-design + apply', '4': 'deep-area top 5'}
          print(descs.get('${{ env.EVOLUTION_LEVEL }}', 'unknown'))
          " 2>&1 || echo "unknown")

          gh pr create \
            --title "evolution(L${{ env.EVOLUTION_LEVEL }}): ${{ env.ENHANCEMENT }} (v${{ env.NEW_VERSION }})" \
            --body "$(cat <<PRBODY
          ## Auto-Evolution Cycle #${{ env.CYCLE_NUM }} -- $(date -u '+%Y-%m-%d %H:%M UTC')

          **Level:** ${{ env.EVOLUTION_LEVEL }} -- ${LEVEL_DESC}
          **Version bump:** v${{ env.NEW_VERSION }}
          **Enhancement applied:** ${{ env.ENHANCEMENT }}
          **Improvement delta:** ${{ env.IMPROVEMENT_DELTA }}

          ## Enhancement scan (top opportunities)
          ${SCAN_SUMMARY}

          ## Before / After
          - Before: ${RECON_BEFORE}
          - After: ${RECON_AFTER}

          ## What changed
          See diff for exact file changes. Only real source improvements trigger PRs.
          PRBODY
          )" \
            --base main \
            --head ${{ env.BRANCH }} || true
