name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Required files present
        run: |
          for f in CERTIFICATE.json MANIFEST.json VERSION LICENSE AGENTS.md pyproject.toml; do
            [ -f "$f" ] || { echo "MISSING: $f"; exit 1; }
          done
          echo "All required files present."

      - name: Tier folders present
        run: |
          for tier in a0_qk_constants a1_at_functions a2_mo_composites a3_og_features a4_sy_orchestration; do
            [ -d "$tier" ] || { echo "MISSING tier: $tier"; exit 1; }
          done
          echo "All tier folders present."

      - name: Validate CERTIFICATE.json
        run: |
          python3 -c "
          import json, sys
          d = json.load(open('CERTIFICATE.json'))
          required = ['audit', 'certificate_sha256', 'certificate_version', 'issued_at', 'issuer', 'written_count']
          missing = [k for k in required if k not in d]
          if missing:
              print('CERTIFICATE.json missing keys:', missing)
              sys.exit(1)
          print('CERTIFICATE.json valid — written_count:', d['written_count'])
          "

      - name: Validate MANIFEST.json
        run: |
          python3 -c "
          import json, sys
          d = json.load(open('MANIFEST.json'))
          if 'components' not in d:
              print('MANIFEST.json missing components key')
              sys.exit(1)
          print('MANIFEST.json valid — components:', len(d['components']))
          "

      - name: Validate VERSION format
        run: |
          version=$(head -1 VERSION)
          echo "$version" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+' || { echo "Bad VERSION: $version"; exit 1; }
          echo "VERSION: $version"
