name: Auto-Evolution — Quality
on:
  schedule:
    - cron: '15 */1 * * *'  # Every hour at :15 (offset from security at :00/:30)
  workflow_dispatch: {}

jobs:
  evolve-quality:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ASS-ADE
        run: pip install -e ".[dev]"

      - name: Create evolution branch
        run: |
          BRANCH="auto-evolve/quality-$(date +%Y%m%d-%H%M)"
          git checkout -b $BRANCH
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Run enhancement scan (quality filter)
        run: |
          ass-ade enhance . --json > enhance_scan_raw.json 2>&1 || true
          python3 -c "
          import json
          try:
              d = json.load(open('enhance_scan_raw.json'))
              quality_types = {'missing_module_docstring', 'missing_function_docstring',
                               'missing_tests', 'bare_except', 'long_function',
                               'unused_import', 'dead_code', 'quality', 'docstring'}
              opps = d.get('opportunities', [])
              qual_opps = [o for o in opps if any(t in o.get('type','').lower() for t in quality_types)]
              if not qual_opps:
                  qual_opps = opps[:1]
              d['opportunities'] = qual_opps
              d['total_found'] = len(qual_opps)
              json.dump(d, open('enhance_scan.json','w'), indent=2)
          except Exception as e:
              json.dump({'opportunities':[], 'total_found':0, 'error':str(e)}, open('enhance_scan.json','w'))
          " 2>&1 || true

      - name: Apply top quality enhancement
        run: |
          COUNT=$(python3 -c "import json; d=json.load(open('enhance_scan.json')); print(d.get('total_found',0))" 2>&1 || echo 0)
          if [ "$COUNT" -gt 0 ]; then
            ass-ade enhance . --apply 1 2>&1 || true
          else
            echo "No quality opportunities found — skipping"
            exit 0
          fi

      - name: Determine enhancement details
        run: |
          ENHANCEMENT=$(python3 -c "
          import json
          try:
              d = json.load(open('enhance_scan.json'))
              opps = d.get('opportunities', [])
              if opps:
                  o = opps[0]
                  print(f\"{o.get('type','unknown')} in {o.get('file','?')}\")
              else:
                  print('no quality opportunities found')
          except Exception as e:
              print(f'scan error: {e}')
          " 2>&1 || echo "unknown")
          echo "ENHANCEMENT=$ENHANCEMENT" >> $GITHUB_ENV

      - name: Bump patch version
        run: |
          CURRENT=$(python3 -c "
          import re
          content = open('pyproject.toml').read()
          m = re.search(r'version = \"([\d.]+)\"', content)
          print(m.group(1) if m else '0.2.0')
          ")
          NEW=$(python3 -c "
          parts = '$CURRENT'.split('.')
          parts[-1] = str(int(parts[-1]) + 1)
          print('.'.join(parts))
          ")
          sed -i "s/version = \"$CURRENT\"/version = \"$NEW\"/" pyproject.toml
          sed -i "s/__version__ = \"$CURRENT\"/__version__ = \"$NEW\"/" __init__.py 2>/dev/null || true
          echo "NEW_VERSION=$NEW" >> $GITHUB_ENV

      - name: Append to EVOLUTION_LOG.md
        run: |
          CYCLE_NUM=$(python3 -c "
          try:
              lines = open('EVOLUTION_LOG.md').readlines()
              nums = [int(l.split('#')[1].split(' ')[1]) for l in lines if l.startswith('## Evolution #')]
              print(max(nums) + 1 if nums else 1)
          except:
              print(1)
          " 2>&1 || echo "1")
          FILES_CHANGED=$(git diff --name-only | grep -vE '^(enhance_scan.*\.json|EVOLUTION_LOG\.md|pyproject\.toml|__init__\.py)$' | wc -l | tr -d ' ')
          cat >> EVOLUTION_LOG.md << EOF

          ## Evolution #${CYCLE_NUM} [QUALITY] — $(date -u '+%Y-%m-%d %H:%M UTC')
          **Enhancement:** ${ENHANCEMENT}
          **Lane:** quality (docstrings, bare-except, long functions, dead code)
          **Files changed:** ${FILES_CHANGED}
          **Version:** ${{ env.NEW_VERSION }}
          EOF

      - name: Commit and push branch
        run: |
          git config user.name "ASS-ADE Auto-Evolve"
          git config user.email "evolve@atomadic.tech"
          git add -A
          PY_CHANGES=$(git diff --cached --name-only \
            | grep -vE '^(enhance_scan.*\.json)$' \
            | wc -l | tr -d ' ')
          if [ "$PY_CHANGES" -eq 0 ]; then
            echo "No quality changes — skipping"
            exit 0
          fi
          git commit -m "evolution/quality: ${ENHANCEMENT} (v${{ env.NEW_VERSION }})"
          git push origin $BRANCH

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SCAN_SUMMARY=$(cat enhance_scan.json 2>/dev/null | python3 -c "
          import json, sys
          try:
              d = json.load(sys.stdin)
              opps = d.get('opportunities', [])
              lines = [f'- \`{o[\"type\"]}\` in \`{o[\"file\"]}\`' for o in opps[:10]]
              print('\n'.join(lines))
          except:
              print('scan unavailable')
          " 2>&1 || echo "scan unavailable")
          gh pr create \
            --title "[QUALITY] evolution: ${ENHANCEMENT} (v${{ env.NEW_VERSION }})" \
            --body "$(cat <<PRBODY
          ## Quality Evolution — $(date -u '+%Y-%m-%d %H:%M UTC')

          **Version:** → v${{ env.NEW_VERSION }}
          **Lane:** QUALITY — docstrings, bare-except, long functions, dead code, unused imports

          ## Quality findings applied
          ${SCAN_SUMMARY}

          > Part of the ASS-ADE three-lane evolution system (general / security / quality).
          > After a few days, the best from all three lanes will merge into v0.3.0.
          PRBODY
          )" \
            --base main \
            --head $BRANCH || true
