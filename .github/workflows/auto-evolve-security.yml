name: Auto-Evolution — Security
on:
  schedule:
    - cron: '*/7 * * * *'
  workflow_dispatch: {}

# Personality: conservative/protective — only apply changes with a clear security benefit.
# Skips if no genuine security findings are present.

jobs:
  evolve-security:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ASS-ADE
        run: pip install -e ".[dev]"

      # Phase 0 — Bootstrap recon
      - name: Phase 0 — Bootstrap recon
        run: ass-ade recon . --json > recon_before.json 2>&1 || true

      # Phase 1 — Assessment scan (full)
      - name: Phase 1 — Assessment scan
        run: ass-ade enhance . --json > enhance_scan_raw.json 2>&1 || true

      # Phase 2 — Context filter: security track (conservative/protective)
      - name: Phase 2 — Context filter (security track)
        run: |
          python3 -c "
          import json
          try:
              d = json.load(open('enhance_scan_raw.json'))
              security_types = {
                  'eval_usage', 'exec_usage', 'input_validation', 'sql_injection',
                  'command_injection', 'hardcoded_secret', 'insecure_hash',
                  'bare_except', 'security', 'path_traversal', 'open_redirect',
              }
              opps = d.get('opportunities', [])
              sec_opps = [o for o in opps if any(t in o.get('type','').lower() for t in security_types)]
              # conservative: only apply if we have a genuine security finding
              d['opportunities'] = sec_opps
              d['total_found'] = len(sec_opps)
              json.dump(d, open('enhance_scan.json','w'), indent=2)
              print(f'Security findings: {len(sec_opps)} of {len(opps)} total')
          except Exception as e:
              json.dump({'opportunities':[], 'total_found':0, 'error':str(e)}, open('enhance_scan.json','w'))
          " 2>&1 || true

          CYCLE_NUM=$(python3 -c "
          try:
              lines = open('EVOLUTION_LOG.md').readlines()
              nums = [int(l.split('#')[-1].split(' ')[0])
                      for l in lines if l.strip().startswith('## Evolution #')]
              print(max(nums) + 1 if nums else 1)
          except:
              print(1)
          " 2>&1 || echo "1")
          echo "CYCLE_NUM=$CYCLE_NUM" >> $GITHUB_ENV

          TOTAL_FOUND=$(python3 -c "
          import json
          try:
              d = json.load(open('enhance_scan.json'))
              print(d.get('total_found', 0))
          except:
              print(0)
          " 2>&1 || echo "0")
          echo "TOTAL_FOUND=$TOTAL_FOUND" >> $GITHUB_ENV

      - name: Create evolution branch
        run: |
          BRANCH="auto-evolve/security-$(date +%Y%m%d-%H%M)"
          git checkout -b $BRANCH
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      # Phase 3 — Synthesis: apply top security fix (conservative: max 1)
      - name: Phase 3 — Synthesis (conservative security apply)
        run: |
          COUNT=$(python3 -c "
          import json
          d = json.load(open('enhance_scan.json'))
          print(d.get('total_found', 0))
          " 2>&1 || echo "0")
          if [ "$COUNT" -gt 0 ]; then
            echo "Applying top 1 security fix (conservative mode)"
            ass-ade enhance . --apply 1 2>&1 || true
          else
            echo "No security opportunities — skipping apply"
            exit 0
          fi

      # Phase 4 — Audit recon
      - name: Phase 4 — Audit recon
        run: ass-ade recon . --json > recon_after.json 2>&1 || true

      # Phase 5 — Autopoiesis validate
      - name: Phase 5 — Autopoiesis validate
        run: |
          ENHANCEMENT=$(python3 -c "
          import json
          try:
              d = json.load(open('enhance_scan.json'))
              opps = d.get('opportunities', [])
              if opps:
                  o = opps[0]
                  print(f\"{o.get('type','unknown')} in {o.get('file','?')}\")
              else:
                  print('no security opportunities found')
          except Exception as e:
              print(f'scan error: {e}')
          " 2>&1 || echo "unknown")
          echo "ENHANCEMENT=$ENHANCEMENT" >> $GITHUB_ENV

      - name: Bump patch version
        run: |
          CURRENT=$(python3 -c "
          import re
          content = open('pyproject.toml').read()
          m = re.search(r'version = \"([\d.]+)\"', content)
          print(m.group(1) if m else '0.2.0')
          ")
          NEW=$(python3 -c "
          parts = '$CURRENT'.split('.')
          parts[-1] = str(int(parts[-1]) + 1)
          print('.'.join(parts))
          ")
          sed -i "s/version = \"$CURRENT\"/version = \"$NEW\"/" pyproject.toml
          sed -i "s/__version__ = \"$CURRENT\"/__version__ = \"$NEW\"/" __init__.py 2>/dev/null || true
          echo "NEW_VERSION=$NEW" >> $GITHUB_ENV

      - name: Append to EVOLUTION_LOG.md
        run: |
          FILES_CHANGED=$(git diff --name-only \
            | grep -vE '^(enhance_scan.*\.json|EVOLUTION_LOG\.md|pyproject\.toml|__init__\.py)$' \
            | wc -l | tr -d ' ')
          cat >> EVOLUTION_LOG.md << EOF

## Evolution #${{ env.CYCLE_NUM }} [SECURITY] — $(date -u '+%Y-%m-%d %H:%M UTC')
**Enhancement:** ${{ env.ENHANCEMENT }}
**Lane:** security — eval/exec removal, input validation, injection fixes
**Personality:** conservative/protective (max 1 change per cycle)
**Files changed:** ${FILES_CHANGED}
**Version:** ${{ env.NEW_VERSION }}
EOF

      - name: Commit and push branch
        run: |
          git config user.name "ASS-ADE Auto-Evolve"
          git config user.email "evolve@atomadic.tech"
          git add -A
          PY_CHANGES=$(git diff --cached --name-only \
            | grep -vE '^(enhance_scan.*\.json)$' \
            | wc -l | tr -d ' ')
          if [ "$PY_CHANGES" -eq 0 ]; then
            echo "No security changes — skipping"
            exit 0
          fi
          git commit -m "evolution/security: ${{ env.ENHANCEMENT }} (v${{ env.NEW_VERSION }})"
          git push origin ${{ env.BRANCH }}

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SCAN_SUMMARY=$(cat enhance_scan.json 2>/dev/null | python3 -c "
          import json, sys
          try:
              d = json.load(sys.stdin)
              opps = d.get('opportunities', [])
              lines = [f'- \`{o[\"type\"]}\` in \`{o[\"file\"]}\`' for o in opps[:10]]
              print('\n'.join(lines))
          except:
              print('scan unavailable')
          " 2>&1 || echo "scan unavailable")
          gh pr create \
            --title "[SECURITY] evolution: ${{ env.ENHANCEMENT }} (v${{ env.NEW_VERSION }})" \
            --body "$(cat <<PRBODY
## Security Evolution Cycle #${{ env.CYCLE_NUM }} — $(date -u '+%Y-%m-%d %H:%M UTC')

**Version:** → v${{ env.NEW_VERSION }}
**Lane:** SECURITY — eval/exec removal, input validation, injection fixes
**Personality:** conservative/protective — one verified security fix per cycle

## Security findings applied
${SCAN_SUMMARY}

> Part of the ASS-ADE five-lane evolution system (general / security / quality / features / performance).
PRBODY
          )" \
            --base main \
            --head ${{ env.BRANCH }} || true
