# Governance-aligned handoff: research pack + epiphany JSON + multi-role panel charter (no LLM hosts).
name: evolution-orchestrate

on:
  workflow_dispatch:
    inputs:
      task:
        description: "One-paragraph MAP=TERRAIN evolution goal"
        required: true
        type: string
  schedule:
    - cron: "0 10 * * 0"

permissions:
  contents: read

jobs:
  handoff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install editable (dev)
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Select task body
        env:
          TASK_DISPATCH: ${{ inputs.task }}
        run: |
          set -euo pipefail
          mkdir -p .ass-ade/evolution-runs/_inbox
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            printf '%s\n' "$TASK_DISPATCH" > .ass-ade/evolution-runs/_inbox/task.md
          else
            cp .ass-ade/evolution-runs/default-task.md .ass-ade/evolution-runs/_inbox/task.md
          fi

      # Optional: FORMAL_CODEX_JSON points at a local formal-spec bundle on self-hosted runners.
      - name: Run evolution orchestrator
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          FORMAL_CODEX_JSON: ${{ vars.FORMAL_CODEX_JSON }}
        run: |
          set -euo pipefail
          rm -rf .ass-ade/evolution-runs/ci-handoff
          python scripts/uep_evolution_orchestrator.py \
            --task-file .ass-ade/evolution-runs/_inbox/task.md \
            --out .ass-ade/evolution-runs/ci-handoff

      - name: Upload handoff bundle
        uses: actions/upload-artifact@v4
        with:
          name: evolution-handoff-${{ github.run_id }}
          path: .ass-ade/evolution-runs/ci-handoff/
