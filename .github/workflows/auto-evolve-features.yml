name: Auto-Evolution -- Features
on:
  schedule:
    - cron: '*/8 * * * *'
  workflow_dispatch: {}

# Personality: creative/additive -- design-first, favors generative improvements.

jobs:
  evolve-features:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ASS-ADE
        run: pip install -e ".[dev]"

      - name: Phase 0 - Bootstrap recon
        run: ass-ade recon . --json > recon_before.json 2>/dev/null || true

      - name: Phase 1 - Assessment scan
        run: |
          python3 -c "
          import json, sys
          sys.path.insert(0, 'src')
          from ass_ade.local.enhancer import build_enhancement_report
          from pathlib import Path
          report = build_enhancement_report(Path('.'))
          print(json.dumps(report, indent=2))
          " > enhance_scan_raw.json 2>/dev/null || echo '{"findings":[],"total_findings":0}' > enhance_scan_raw.json

      - name: Phase 2 - Context (features track)
        run: |
          python3 -c "
          import json
          try:
              d = json.load(open('enhance_scan_raw.json'))
              feature_types = {
                  'missing_tests', 'technical_debt', 'todo', 'fixme',
                  'missing_feature', 'incomplete_implementation', 'stub_implementation',
                  'bare_except', 'missing_docs', 'missing_function_docstring',
              }
              findings = d.get('findings', [])
              feat_findings = [o for o in findings if any(t in o.get('category','').lower() for t in feature_types)]
              if not feat_findings:
                  feat_findings = findings
              d['findings'] = feat_findings
              d['total_findings'] = len(feat_findings)
              json.dump(d, open('enhance_scan.json','w'), indent=2)
              print(f'Feature opportunities: {len(feat_findings)} of {len(findings)} total')
          except Exception as e:
              json.dump({'findings':[], 'total_findings':0, 'error':str(e)}, open('enhance_scan.json','w'))
              print(f'Scan parse error: {e}')
          " 2>&1 || true

          CYCLE_NUM=$(python3 -c "
          try:
              lines = open('EVOLUTION_LOG.md').readlines()
              nums = [int(l.split('#')[-1].split(' ')[0])
                      for l in lines if l.strip().startswith('## Evolution #')]
              print(max(nums) + 1 if nums else 1)
          except:
              print(1)
          " 2>&1 || echo "1")
          echo "CYCLE_NUM=$CYCLE_NUM" >> $GITHUB_ENV

          TOTAL_FOUND=$(python3 -c "
          import json
          try:
              d = json.load(open('enhance_scan.json'))
              print(d.get('total_findings', 0))
          except:
              print(0)
          " 2>&1 || echo "0")
          echo "TOTAL_FOUND=$TOTAL_FOUND" >> $GITHUB_ENV

          DESIGN_GOAL=$(python3 -c "
          import json
          try:
              d = json.load(open('enhance_scan.json'))
              findings = d.get('findings', [])
              categories = list(dict.fromkeys(o.get('category','') for o in findings[:5]))
              files = list(dict.fromkeys(o.get('file','') for o in findings[:3]))
              goal = 'improve: ' + ', '.join(categories[:3])
              if files:
                  goal += ' in ' + ', '.join(files[:2])
              print(goal)
          except:
              print('improve code quality and extensibility')
          " 2>&1 || echo "improve code quality and extensibility")
          echo "DESIGN_GOAL=$DESIGN_GOAL" >> $GITHUB_ENV

      - name: Create evolution branch
        run: |
          BRANCH="auto-evolve/features-$(date +%Y%m%d-%H%M)"
          git checkout -b $BRANCH
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Phase 3 - Apply feature improvements
        run: |
          echo "Feature opportunities: ${{ env.TOTAL_FOUND }}"
          echo "Design goal: ${{ env.DESIGN_GOAL }}"
          python3 scripts/apply_fixes.py 2 --lane features 2>&1 || true

      - name: Phase 4 - Audit recon
        run: ass-ade recon . --json > recon_after.json 2>/dev/null || true

      - name: Phase 5 - Autopoiesis validate
        run: |
          ENHANCEMENT=$(python3 -c "
          import json
          try:
              d = json.load(open('enhance_scan.json'))
              findings = d.get('findings', [])
              if findings:
                  o = findings[0]
                  print(f\"{o.get('category','unknown')} in {o.get('file','?')}\")
              else:
                  print('no feature opportunities found')
          except Exception as e:
              print(f'scan error: {e}')
          " 2>&1 || echo "unknown")
          echo "ENHANCEMENT=$ENHANCEMENT" >> $GITHUB_ENV

      - name: Bump patch version
        run: |
          CURRENT=$(python3 -c "
          import re
          content = open('pyproject.toml').read()
          m = re.search(r'version = \"([\d.]+)\"', content)
          print(m.group(1) if m else '0.2.0')
          ")
          NEW=$(python3 -c "
          parts = '$CURRENT'.split('.')
          parts[-1] = str(int(parts[-1]) + 1)
          print('.'.join(parts))
          ")
          sed -i "s/version = \"$CURRENT\"/version = \"$NEW\"/" pyproject.toml
          sed -i "s/__version__ = \"$CURRENT\"/__version__ = \"$NEW\"/" __init__.py 2>/dev/null || true
          echo "NEW_VERSION=$NEW" >> $GITHUB_ENV

      - name: Append to EVOLUTION_LOG.md
        run: |
          FILES_CHANGED=$(git diff --name-only | grep '\.py$' | wc -l | tr -d ' ')
          cat >> EVOLUTION_LOG.md << EOF

          ## Evolution #${{ env.CYCLE_NUM }} [FEATURES] -- $(date -u '+%Y-%m-%d %H:%M UTC')
          **Enhancement:** ${{ env.ENHANCEMENT }}
          **Design goal:** ${{ env.DESIGN_GOAL }}
          **Lane:** features -- missing docs, technical debt, new capabilities
          **Personality:** creative/additive (top 2 per cycle)
          **Python files changed:** ${FILES_CHANGED}
          **Version:** ${{ env.NEW_VERSION }}
          EOF

      - name: Commit and push branch
        run: |
          git config user.name "ASS-ADE Auto-Evolve"
          git config user.email "evolve@atomadic.tech"
          git add -A
          PY_CHANGES=$(git diff --cached --name-only | grep '\.py$' | wc -l | tr -d ' ')
          if [ "$PY_CHANGES" -eq 0 ]; then
            echo "No Python source changes -- skipping commit and PR"
            exit 0
          fi
          git commit -m "evolution/features: ${{ env.ENHANCEMENT }} (v${{ env.NEW_VERSION }})"
          git push origin ${{ env.BRANCH }}

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          SCAN_SUMMARY=$(cat enhance_scan.json 2>/dev/null | python3 -c "
          import json, sys
          try:
              d = json.load(sys.stdin)
              findings = d.get('findings', [])
              lines = [f'- \`{o[\"category\"]}\` in \`{o[\"file\"]}\`' for o in findings[:10]]
              print('\n'.join(lines))
          except:
              print('scan unavailable')
          " 2>&1 || echo "scan unavailable")

          RECON_BEFORE=$(cat recon_before.json 2>/dev/null | python3 -c "
          import json, sys
          try:
              d = json.load(sys.stdin)
              print(f'{d[\"total_py_files\"]} py files, {d[\"manifest_components\"]} components')
          except:
              print('unavailable')
          " 2>&1 || echo "unavailable")

          RECON_AFTER=$(cat recon_after.json 2>/dev/null | python3 -c "
          import json, sys
          try:
              d = json.load(sys.stdin)
              print(f'{d[\"total_py_files\"]} py files, {d[\"manifest_components\"]} components')
          except:
              print('unavailable')
          " 2>&1 || echo "unavailable")

          BODY="## Features Evolution Cycle #${{ env.CYCLE_NUM }} -- $(date -u '+%Y-%m-%d %H:%M UTC')

**Version:** v${{ env.NEW_VERSION }}
**Lane:** FEATURES -- missing docs, technical debt, new capabilities
**Personality:** creative/additive -- design-first, top 2 per cycle

## Design goal
${{ env.DESIGN_GOAL }}

## Feature opportunities
${SCAN_SUMMARY}

## Before / After
- Before: ${RECON_BEFORE}
- After: ${RECON_AFTER}

> Part of the ASS-ADE five-lane evolution system."

          gh api repos/AAAA-Nexus/ASS-ADE/pulls \
            -X POST \
            -f title="[FEATURES] evolution: ${{ env.ENHANCEMENT }} (v${{ env.NEW_VERSION }})" \
            -f body="$BODY" \
            -f head="${{ env.BRANCH }}" \
            -f base="main" || true
