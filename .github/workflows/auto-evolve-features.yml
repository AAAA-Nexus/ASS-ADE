name: Auto-Evolution -- Features
on:
  schedule:
    - cron: '*/8 * * * *'
  workflow_dispatch: {}

# Personality: creative/additive -- design-first, favors generative improvements.

jobs:
  evolve-features:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ASS-ADE
        run: pip install -e ".[dev]"

      - name: Phase 0 - Bootstrap recon
        run: ass-ade recon . --json > recon_before.json 2>&1 || true

      - name: Phase 1 - Assessment scan
        run: ass-ade enhance . --json > enhance_scan_raw.json 2>&1 || true

      - name: Phase 2 - Context (features track)
        run: |
          python3 -c "
          import json
          try:
              d = json.load(open('enhance_scan_raw.json'))
              feature_types = {
                  'missing_feature', 'incomplete_implementation', 'enhancement_opportunity',
                  'missing_method', 'stub_implementation', 'todo', 'fixme',
              }
              opps = d.get('opportunities', [])
              feat_opps = [o for o in opps if any(t in o.get('type','').lower() for t in feature_types)]
              if not feat_opps:
                  feat_opps = opps
              d['opportunities'] = feat_opps
              d['total_found'] = len(feat_opps)
              json.dump(d, open('enhance_scan.json','w'), indent=2)
              print(f'Feature opportunities: {len(feat_opps)} of {len(opps)} total')
          except Exception as e:
              json.dump({'opportunities':[], 'total_found':0, 'error':str(e)}, open('enhance_scan.json','w'))
          " 2>&1 || true

          CYCLE_NUM=$(python3 -c "
          try:
              lines = open('EVOLUTION_LOG.md').readlines()
              nums = [int(l.split('#')[-1].split(' ')[0])
                      for l in lines if l.strip().startswith('## Evolution #')]
              print(max(nums) + 1 if nums else 1)
          except:
              print(1)
          " 2>&1 || echo "1")
          echo "CYCLE_NUM=$CYCLE_NUM" >> $GITHUB_ENV

          TOTAL_FOUND=$(python3 -c "
          import json
          try:
              d = json.load(open('enhance_scan.json'))
              print(d.get('total_found', 0))
          except:
              print(0)
          " 2>&1 || echo "0")
          echo "TOTAL_FOUND=$TOTAL_FOUND" >> $GITHUB_ENV

          DESIGN_GOAL=$(python3 -c "
          import json
          try:
              d = json.load(open('enhance_scan.json'))
              opps = d.get('opportunities', [])
              types = list(dict.fromkeys(o.get('type','') for o in opps[:5]))
              files = list(dict.fromkeys(o.get('file','') for o in opps[:3]))
              goal = 'add capability: ' + ', '.join(types[:3])
              if files:
                  goal += ' in ' + ', '.join(files[:2])
              print(goal)
          except:
              print('add capability and improve extensibility')
          " 2>&1 || echo "add capability and improve extensibility")
          echo "DESIGN_GOAL=$DESIGN_GOAL" >> $GITHUB_ENV

      - name: Create evolution branch
        run: |
          BRANCH="auto-evolve/features-$(date +%Y%m%d-%H%M)"
          git checkout -b $BRANCH
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Phase 3 - Synthesis (creative design + apply)
        run: |
          echo "Blueprint design goal: ${{ env.DESIGN_GOAL }}"
          ass-ade design "${{ env.DESIGN_GOAL }}" 2>&1 || true
          echo "Applying top 2 enhancements"
          ass-ade enhance . --apply 1,2 2>&1 || true

      - name: Phase 4 - Audit recon
        run: ass-ade recon . --json > recon_after.json 2>&1 || true

      - name: Phase 5 - Autopoiesis validate
        run: |
          ENHANCEMENT=$(python3 -c "
          import json
          try:
              d = json.load(open('enhance_scan.json'))
              opps = d.get('opportunities', [])
              if opps:
                  o = opps[0]
                  print(f\"{o.get('type','unknown')} in {o.get('file','?')}\")
              else:
                  print('blueprint design applied')
          except Exception as e:
              print(f'scan error: {e}')
          " 2>&1 || echo "feature design applied")
          echo "ENHANCEMENT=$ENHANCEMENT" >> $GITHUB_ENV

      - name: Bump patch version
        run: |
          CURRENT=$(python3 -c "
          import re
          content = open('pyproject.toml').read()
          m = re.search(r'version = \"([\d.]+)\"', content)
          print(m.group(1) if m else '0.2.0')
          ")
          NEW=$(python3 -c "
          parts = '$CURRENT'.split('.')
          parts[-1] = str(int(parts[-1]) + 1)
          print('.'.join(parts))
          ")
          sed -i "s/version = \"$CURRENT\"/version = \"$NEW\"/" pyproject.toml
          sed -i "s/__version__ = \"$CURRENT\"/__version__ = \"$NEW\"/" __init__.py 2>/dev/null || true
          echo "NEW_VERSION=$NEW" >> $GITHUB_ENV

      - name: Append to EVOLUTION_LOG.md
        run: |
          FILES_CHANGED=$(git diff --name-only \
            | grep -vE '^(enhance_scan.*\.json|EVOLUTION_LOG\.md|pyproject\.toml|__init__\.py)$' \
            | wc -l | tr -d ' ')
          cat >> EVOLUTION_LOG.md << EOF

          ## Evolution #${{ env.CYCLE_NUM }} [FEATURES] -- $(date -u '+%Y-%m-%d %H:%M UTC')
          **Enhancement:** ${{ env.ENHANCEMENT }}
          **Design goal:** ${{ env.DESIGN_GOAL }}
          **Lane:** features -- blueprint design, new capabilities, extensibility
          **Personality:** creative/additive (design-first, top 2 per cycle)
          **Files changed:** ${FILES_CHANGED}
          **Version:** ${{ env.NEW_VERSION }}
          EOF

      - name: Commit and push branch
        run: |
          git config user.name "ASS-ADE Auto-Evolve"
          git config user.email "evolve@atomadic.tech"
          git add -A
          PY_CHANGES=$(git diff --cached --name-only \
            | grep -vE '^(enhance_scan.*\.json)$' \
            | wc -l | tr -d ' ')
          if [ "$PY_CHANGES" -eq 0 ]; then
            echo "No feature changes -- skipping"
            exit 0
          fi
          git commit -m "evolution/features: ${{ env.ENHANCEMENT }} (v${{ env.NEW_VERSION }})"
          git push origin ${{ env.BRANCH }}

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SCAN_SUMMARY=$(cat enhance_scan.json 2>/dev/null | python3 -c "
          import json, sys
          try:
              d = json.load(sys.stdin)
              opps = d.get('opportunities', [])
              lines = [f'- \`{o[\"type\"]}\` in \`{o[\"file\"]}\`' for o in opps[:10]]
              print('\n'.join(lines))
          except:
              print('scan unavailable')
          " 2>&1 || echo "scan unavailable")

          RECON_BEFORE=$(cat recon_before.json 2>/dev/null | python3 -c "
          import json, sys
          try:
              d = json.load(sys.stdin)
              print(f'{d[\"total_py_files\"]} py files, {d[\"manifest_components\"]} components')
          except:
              print('unavailable')
          " 2>&1 || echo "unavailable")

          RECON_AFTER=$(cat recon_after.json 2>/dev/null | python3 -c "
          import json, sys
          try:
              d = json.load(sys.stdin)
              print(f'{d[\"total_py_files\"]} py files, {d[\"manifest_components\"]} components')
          except:
              print('unavailable')
          " 2>&1 || echo "unavailable")

          gh pr create \
            --title "[FEATURES] evolution: ${{ env.ENHANCEMENT }} (v${{ env.NEW_VERSION }})" \
            --body "$(cat <<PRBODY
          ## Features Evolution Cycle #${{ env.CYCLE_NUM }} -- $(date -u '+%Y-%m-%d %H:%M UTC')

          **Version:** v${{ env.NEW_VERSION }}
          **Lane:** FEATURES -- blueprint design, new capabilities, extensibility
          **Personality:** creative/additive -- design-first, top 2 per cycle

          ## Design goal
          ${{ env.DESIGN_GOAL }}

          ## Feature opportunities
          ${SCAN_SUMMARY}

          ## Before / After
          - Before: ${RECON_BEFORE}
          - After: ${RECON_AFTER}

          > Part of the ASS-ADE five-lane evolution system.
          PRBODY
          )" \
            --base main \
            --head ${{ env.BRANCH }} || true
