[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ass-ade"
version = "0.2.0"
description = "ASS-ADE v0.2.0 — functional rebuild, product works out of the box"
requires-python = ">=3.11"

[project.scripts]
ass-ade = "ass_ade.cli:app"

[project.optional-dependencies]
dev = []

[tool.hatch.build.targets.wheel]
packages = ["src/ass_ade"]

[tool.hatch.build.targets.sdist]
include = ["src/"]
